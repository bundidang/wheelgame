<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucky Draw by Super Mink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;700&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --pointer-color-main: #ef4444; 
            --pointer-color-dark: #7f1d1d;
            --bulb-on-color: #fff700;
            --ring-color: #1e293b;
        }
        body { 
            font-family: 'IBM Plex Sans Thai', sans-serif; 
            min-height: 100vh; margin: 0;
            background-color: #e2e8f0;
            background-size: cover; background-position: center; background-repeat: no-repeat;
            display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; padding: 20px;
        }

        #top-logo-container { margin-bottom: 20px; display: none; text-align: center; width: 100%; }
        #top-logo-img { height: auto; object-fit: contain; margin: 0 auto; transition: width 0.1s ease-out; }
        
        #headline-display { 
            font-weight: 900; text-align: center; margin-bottom: 3.5rem;
            text-transform: uppercase; line-height: 1.1; 
        }

        #wheel-outer-ring {
            position: relative; 
            transition: width 0.2s ease-out, max-width 0.2s ease-out;
            aspect-ratio: 1/1;
            background: var(--ring-color); border-radius: 50%; padding: 22px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 2px 10px rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
        }

        #bulbs-container { position: absolute; inset: 0; pointer-events: none; }

        .center-ring-inner {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90px; height: 90px; z-index: 50; border-radius: 50%; 
            background: white; border: 4px solid #cbd5e1; outline: 2px solid #94a3b8;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3), inset 0 4px 10px rgba(0,0,0,0.15);
            display: flex; align-items: center; justify-content: center; overflow: hidden; pointer-events: none;
        }

        .pointer-container { position: absolute; right: -12px; top: 50%; transform: translateY(-50%); z-index: 100; filter: drop-shadow(-5px 5px 10px rgba(0,0,0,0.4)); }
        
        #pointer { 
            width: 45px; height: 65px; 
            background: linear-gradient(135deg, var(--pointer-color-main) 0%, var(--pointer-color-dark) 100%); 
            clip-path: polygon(50% 100%, 0% 15%, 20% 0%, 80% 0%, 100% 15%); 
            transform-origin: center 5px; transform: rotate(90deg);
            transition: transform 0.1s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        #wheel-wrapper { position: relative; width: 100%; height: 100%; cursor: pointer; }
        canvas { width: 100%; height: 100%; border-radius: 50%; }

        .bulb { 
            position: absolute; width: 10px; height: 10px; 
            background: #475569; border-radius: 50%; z-index: 6; 
            transform: translate(-50%, -50%); 
            transition: left 0.2s ease-out, top 0.2s ease-out;
        }
        .bulb.active { background: var(--bulb-on-color); box-shadow: 0 0 15px var(--bulb-on-color), 0 0 5px white; }

        #admin-panel { position: fixed; inset: 0; background: #f8fafc; z-index: 2000; display: none; flex-direction: column; }
        #admin-panel.show { display: flex; }
        .tab-btn { padding: 14px; font-weight: 700; color: #94a3b8; border-bottom: 3px solid transparent; flex: 1; text-align: center; }
        .tab-btn.active { color: #f97316; border-bottom-color: #f97316; background: rgba(249, 115, 22, 0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .footer-text { 
            margin-top: 50px; color: #64748b; font-size: 14px; font-weight: 800; 
            letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; 
            opacity: 0.7; transition: opacity 0.3s;
        }
        .footer-text:hover { opacity: 1; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="top-logo-container"><img id="top-logo-img" src=""></div>
    <h1 id="headline-display">LUCKY DRAW</h1>

    <div id="wheel-outer-ring">
        <div id="bulbs-container"></div>
        <div class="pointer-container"><div id="pointer"></div></div>
        <div class="center-ring-inner">
            <img id="inner-logo-img" src="" style="display:none;" class="max-w-[85%] max-h-[85%] object-contain">
            <span id="logo-placeholder" class="text-slate-400 text-[10px] font-black uppercase">Start</span>
        </div>
        <div id="wheel-wrapper" onclick="startSpin()">
            <canvas id="wheelCanvas" width="800" height="800"></canvas>
        </div>
    </div>

    <div onclick="toggleAdmin()" class="footer-text">Good Luck</div>

    <!-- Admin Panel -->
    <div id="admin-panel">
        <div class="bg-white border-b p-4 flex justify-between items-center shadow-sm">
            <b class="text-xl text-slate-800 ml-2">Setup System</b>
            <button onclick="toggleAdmin()" class="text-4xl text-slate-300 hover:text-slate-500 mr-2">&times;</button>
        </div>
        <div class="bg-white border-b flex">
            <button class="tab-btn active" onclick="switchTab(event, 'tab-display')">Visuals & Branding</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-prizes')">Prizes & Odds (%)</button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-6 bg-slate-50">
            <div id="tab-display" class="tab-content active">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm h-fit">
                        <label class="text-[11px] font-bold text-orange-500 uppercase block mb-4 tracking-wider">1. Media Uploads</label>
                        <div class="space-y-4">
                            <div>
                                <span class="text-xs font-bold text-slate-500">Top Logo</span>
                                <input type="file" accept="image/*" class="block w-full text-xs mt-1" onchange="handleFileUpload(this, 'headerLogo')">
                                <div class="mt-2 flex items-center justify-between">
                                    <span class="text-[10px] text-slate-400">Size: <span id="logo-size-val">180px</span></span>
                                    <input type="range" id="in-logo-size" min="50" max="500" value="180" class="w-24 accent-orange-500" oninput="updateLogoSize(this.value)">
                                </div>
                            </div>
                            <div><span class="text-xs font-bold text-slate-500">Center Logo</span><input type="file" accept="image/*" class="block w-full text-xs mt-1" onchange="handleFileUpload(this, 'centerLogo')"></div>
                            <div><span class="text-xs font-bold text-slate-500">Background Image</span><input type="file" accept="image/*" class="block w-full text-xs mt-1" onchange="handleFileUpload(this, 'bgImage')"></div>
                        </div>
                    </div>
                    <div class="space-y-6">
                        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                            <label class="text-[11px] font-bold text-orange-500 uppercase block mb-4 tracking-wider">2. Headline Control</label>
                            <input id="in-headline" type="text" class="w-full p-2 border border-slate-200 rounded-lg text-sm font-bold mb-3" placeholder="LUCKY DRAW">
                            <div class="grid grid-cols-2 gap-4">
                                <div><span class="text-[10px] font-bold text-slate-400 block uppercase">Size</span><input type="range" id="in-headline-size" min="20" max="120" value="48" class="w-full accent-orange-500" oninput="updateHeadlineSize(this.value)"></div>
                                <div><span class="text-[10px] font-bold text-slate-400 block uppercase">Headline Color</span><input type="color" id="in-font-color" class="w-full h-8 cursor-pointer"></div>
                            </div>
                        </div>
                        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                            <label class="text-[11px] font-bold text-orange-500 uppercase block mb-4 tracking-wider">3. Wheel Appearance & Scale</label>
                            <div class="grid grid-cols-3 gap-2 mb-4">
                                <div><span class="text-[9px] text-slate-400 uppercase font-bold">Color A</span><input type="color" id="in-wheel-a" class="w-full h-8 rounded-md"></div>
                                <div><span class="text-[9px] text-slate-400 uppercase font-bold">Color B</span><input type="color" id="in-wheel-b" class="w-full h-8 rounded-md"></div>
                                <div><span class="text-[9px] text-blue-600 uppercase font-bold">Wheel Text</span><input type="color" id="in-wheel-text-color" class="w-full h-8 rounded-md"></div>
                                <div><span class="text-[9px] text-slate-400 uppercase font-bold">Bulb</span><input type="color" id="in-bulb-color" class="w-full h-8 rounded-md"></div>
                                <!-- New Pointer Color Control -->
                                <div><span class="text-[9px] text-red-600 uppercase font-bold">Pointer</span><input type="color" id="in-pointer-color" class="w-full h-8 rounded-md" oninput="updatePointerColor(this.value)"></div>
                            </div>
                            <div class="space-y-4 pt-2 border-t border-slate-100">
                                <div>
                                    <div class="flex justify-between"><span class="text-[10px] font-bold text-slate-500 uppercase">Wheel Overall Scale</span><span id="wheel-scale-val" class="text-[10px] text-orange-500">480px</span></div>
                                    <input type="range" id="in-wheel-scale" min="200" max="800" value="480" class="w-full accent-orange-500" oninput="updateWheelScale(this.value)">
                                </div>
                                <div>
                                    <div class="flex justify-between"><span class="text-[10px] font-bold text-slate-500 uppercase">Prize Font Size</span><span id="prize-font-val" class="text-[10px] text-orange-500">32px</span></div>
                                    <input type="range" id="in-prize-font-size" min="10" max="60" value="32" class="w-full accent-orange-500" oninput="updatePrizeFontSize(this.value)">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="tab-prizes" class="tab-content">
                <div class="bg-orange-50 border border-orange-100 p-3 rounded-xl mb-4 flex justify-between items-center">
                    <div><span class="text-xs font-bold text-orange-700">Total Probability: <span id="total-percent">0</span>%</span></div>
                </div>
                <div id="prize-list-container" class="space-y-2"></div>
                <button onclick="addPrizeRow()" class="w-full bg-white border-2 border-dashed border-slate-300 p-4 rounded-2xl mt-4 font-bold text-slate-400 hover:border-orange-300 hover:text-orange-500 transition-all">+ Add Prize Item</button>
            </div>
        </div>
        <div class="p-6 bg-white border-t"><button onclick="save()" class="w-full bg-orange-500 hover:bg-orange-600 text-white p-5 rounded-2xl font-black uppercase tracking-widest shadow-lg">Save & Refresh Wheel</button></div>
    </div>

    <script>
        const STORAGE_KEY = 'lucky_draw_v26_supermink';
        let config = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
            headline: 'LUCKY DRAW', headlineSize: 48, fontColor: '#1e293b',
            wa: '#f97316', wb: '#1e293b', wheelTextColor: '#ffffff',
            ringColor: '#1e293b', bulb: '#fff700', pointerColor: '#ef4444',
            headerLogoSize: 180, wheelScale: 480, prizeFontSize: 32, 
            prizes: [{name:'IPHONE 15', percent: 10}, {name:'GOLD BAR', percent: 5}, {name:'CASH 1,000', percent: 20}, {name:'MOTO BIKE', percent: 5}, {name:'THANK YOU', percent: 40}, {name:'VOUCHER', percent: 20}],
            headerLogo: '', centerLogo: '', bgImage: ''
        };

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        let isSpinning = false;
        let currentRotation = 0; 
        let lastPrizeIndex = -1;

        function drawWheel() {
            if (config.prizes.length === 0) return;
            const c = canvas.width / 2, r = c - 10, arc = (2 * Math.PI) / config.prizes.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            config.prizes.forEach((p, i) => {
                const angle = i * arc;
                ctx.fillStyle = i % 2 ? config.wb : config.wa;
                ctx.beginPath(); ctx.moveTo(c, c); ctx.arc(c, c, r, angle, angle + arc); ctx.fill();
                ctx.save(); ctx.translate(c, c); ctx.rotate(angle + arc / 2);
                ctx.fillStyle = config.wheelTextColor;
                ctx.textAlign = 'right'; 
                ctx.font = `900 ${config.prizeFontSize}px IBM Plex Sans Thai`; 
                ctx.fillText(p.name, r - 40, 10); ctx.restore();
            });
        }

        function getWinnerIndex() {
            const totalWeight = config.prizes.reduce((sum, p) => sum + (parseFloat(p.percent) || 0), 0);
            if (totalWeight <= 0) return Math.floor(Math.random() * config.prizes.length);
            let randomNum = Math.random() * totalWeight;
            for (let i = 0; i < config.prizes.length; i++) {
                const pWeight = parseFloat(config.prizes[i].percent) || 0;
                if (randomNum < pWeight) return i;
                randomNum -= pWeight;
            }
            return 0;
        }

        function startSpin() {
            if (isSpinning || config.prizes.length === 0) return;
            isSpinning = true;
            const winnerIndex = getWinnerIndex();
            const prizeCount = config.prizes.length;
            const degPerPrize = 360 / prizeCount;
            const stopAt = 360 - (winnerIndex * degPerPrize + (degPerPrize / 2));
            const totalRotation = currentRotation + (360 * 10) + stopAt - (currentRotation % 360);
            const wheel = document.getElementById('wheel-wrapper');
            wheel.style.transition = `transform 6s cubic-bezier(0.15, 0, 0.15, 1)`;
            wheel.style.transform = `rotate(${totalRotation}deg)`;
            setTimeout(() => { currentRotation = totalRotation; isSpinning = false; }, 6000);
        }

        function updateAnimations() {
            const wheel = document.getElementById('wheel-wrapper');
            const pointer = document.getElementById('pointer');
            const style = window.getComputedStyle(wheel);
            const matrix = new DOMMatrixReadOnly(style.transform);
            const angle = Math.atan2(matrix.b, matrix.a) * (180 / Math.PI);
            const normalizedAngle = (angle < 0 ? angle + 360 : angle);
            const idleOffset = Math.floor(Date.now() / 300);
            const spinStep = Math.floor(angle / 15); 
            document.querySelectorAll('.bulb').forEach((b, i) => {
                const isActive = (i + idleOffset + spinStep) % 2 === 0;
                b.classList.toggle('active', isActive);
            });
            const prizeCount = config.prizes.length;
            const degPerPrize = 360 / prizeCount;
            const currentIndex = Math.floor(((360 - normalizedAngle + 90) % 360) / degPerPrize);
            if (currentIndex !== lastPrizeIndex) {
                pointer.style.transform = `rotate(70deg)`;
                setTimeout(() => { pointer.style.transform = `rotate(90deg)`; }, 50);
                lastPrizeIndex = currentIndex;
            }
            requestAnimationFrame(updateAnimations);
        }

        function renderPrizeInputs() {
            const container = document.getElementById('prize-list-container');
            container.innerHTML = '';
            config.prizes.forEach((p, i) => {
                const row = document.createElement('div');
                row.className = "flex gap-2 bg-white p-2 rounded-lg border items-center shadow-sm";
                row.innerHTML = `<input class="flex-1 font-bold text-sm p-1 outline-none" value="${p.name}" oninput="config.prizes[${i}].name=this.value">
                    <div class="flex items-center gap-1 bg-slate-50 px-2 rounded border">
                        <input type="number" step="any" class="w-16 text-center bg-transparent text-sm font-black text-orange-600 p-1 outline-none" value="${p.percent}" oninput="updatePercentData(${i}, this.value)">
                        <span class="text-[10px] font-bold text-slate-400">%</span>
                    </div>
                    <button onclick="removePrize(${i})" class="text-red-400 px-2 text-xl">&times;</button>`;
                container.appendChild(row);
            });
            calculateTotal();
        }

        function updatePercentData(i, v) { config.prizes[i].percent = v; calculateTotal(); }
        function calculateTotal() {
            let total = config.prizes.reduce((sum, p) => sum + (parseFloat(p.percent) || 0), 0);
            document.getElementById('total-percent').textContent = total.toFixed(0);
        }

        function updateWheelScale(v) {
            config.wheelScale = v;
            document.getElementById('wheel-scale-val').textContent = v + 'px';
            const wheelRing = document.getElementById('wheel-outer-ring');
            wheelRing.style.maxWidth = v + 'px';
            wheelRing.style.width = '80vw'; 
            repositionBulbs();
        }

        function repositionBulbs() {
            const ring = document.getElementById('wheel-outer-ring');
            const bulbs = document.querySelectorAll('.bulb');
            if (!ring || bulbs.length === 0) return;
            const radius = ring.offsetWidth / 2;
            const bulbRadius = radius - 11; 
            bulbs.forEach((b, i) => {
                const angle = (i * 15) * (Math.PI / 180);
                const x = 50 + (bulbRadius / ring.offsetWidth * 100) * Math.cos(angle);
                const y = 50 + (bulbRadius / ring.offsetWidth * 100) * Math.sin(angle);
                b.style.left = x + '%';
                b.style.top = y + '%';
            });
        }

        // --- เพิ่มฟังก์ชันเปลี่ยนสี Pointer ---
        function updatePointerColor(hex) {
            config.pointerColor = hex;
            const darkHex = adjustColor(hex, -40); // สร้างสีเข้มขึ้น 40% สำหรับ Gradient
            document.documentElement.style.setProperty('--pointer-color-main', hex);
            document.documentElement.style.setProperty('--pointer-color-dark', darkHex);
        }

        // Helper Function สำหรับคำนวณสีให้เข้มขึ้น/สว่างขึ้น
        function adjustColor(hex, percent) {
            let num = parseInt(hex.replace("#",""),16), amt = Math.round(2.55 * percent), R = (num >> 16) + amt, G = (num >> 8 & 0x00FF) + amt, B = (num & 0x0000FF) + amt;
            return "#" + (0x1000000 + (R<255?R<0?0:R:255)*0x10000 + (G<255?G<0?0:G:255)*0x100 + (B<255?B<0?0:B:255)).toString(16).slice(1);
        }

        function updatePrizeFontSize(v) {
            config.prizeFontSize = v;
            document.getElementById('prize-font-val').textContent = v + 'px';
            drawWheel(); 
        }

        function updateLogoSize(v) { config.headerLogoSize = v; document.getElementById('logo-size-val').textContent = v+'px'; }
        function updateHeadlineSize(v) { 
            config.headlineSize = v; 
            const h = document.getElementById('headline-display');
            h.style.fontSize = v + 'px';
        }

        function removePrize(i) { config.prizes.splice(i, 1); renderPrizeInputs(); drawWheel(); }
        function addPrizeRow() { config.prizes.push({name: 'NEW PRIZE', percent: 0}); renderPrizeInputs(); drawWheel(); }
        function toggleAdmin() { const p = document.getElementById('admin-panel'); p.classList.toggle('show'); if(p.classList.contains('show')) renderPrizeInputs(); }
        function switchTab(e, id) { document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active")); document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active")); document.getElementById(id).classList.add("active"); e.currentTarget.classList.add("active"); }
        function handleFileUpload(input, type) { if (input.files[0]) { const r = new FileReader(); r.onload = (e) => config[type] = e.target.result; r.readAsDataURL(input.files[0]); } }
        
        function save() {
            config.headline = document.getElementById('in-headline').value;
            config.fontColor = document.getElementById('in-font-color').value;
            config.wa = document.getElementById('in-wheel-a').value;
            config.wb = document.getElementById('in-wheel-b').value;
            config.wheelTextColor = document.getElementById('in-wheel-text-color').value;
            config.bulb = document.getElementById('in-bulb-color').value;
            config.pointerColor = document.getElementById('in-pointer-color').value;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
            location.reload(); 
        }

        window.onload = () => {
            const h = document.getElementById('headline-display');
            h.textContent = config.headline; h.style.color = config.fontColor; h.style.fontSize = config.headlineSize + 'px';
            
            const bContainer = document.getElementById('bulbs-container');
            for (let i = 0; i < 24; i++) {
                const b = document.createElement('div'); 
                b.className = 'bulb'; 
                bContainer.appendChild(b);
            }

            updateWheelScale(config.wheelScale || 480);
            updatePrizeFontSize(config.prizeFontSize || 32);
            updatePointerColor(config.pointerColor || '#ef4444');

            document.body.style.setProperty('--bulb-on-color', config.bulb);
            if (config.bgImage) document.body.style.backgroundImage = `url(${config.bgImage})`;
            if (config.headerLogo) { 
                document.getElementById('top-logo-container').style.display = 'block'; 
                const img = document.getElementById('top-logo-img'); 
                img.src = config.headerLogo; img.style.width = config.headerLogoSize + 'px'; 
            }
            if (config.centerLogo) { 
                const img = document.getElementById('inner-logo-img'); 
                img.src = config.centerLogo; img.style.display = 'block'; 
                document.getElementById('logo-placeholder').style.display = 'none'; 
            }
            
            document.getElementById('in-headline').value = config.headline;
            document.getElementById('in-headline-size').value = config.headlineSize;
            document.getElementById('in-font-color').value = config.fontColor;
            document.getElementById('in-wheel-a').value = config.wa;
            document.getElementById('in-wheel-b').value = config.wb;
            document.getElementById('in-wheel-text-color').value = config.wheelTextColor || '#ffffff';
            document.getElementById('in-bulb-color').value = config.bulb;
            document.getElementById('in-pointer-color').value = config.pointerColor || '#ef4444';
            document.getElementById('in-wheel-scale').value = config.wheelScale || 480;
            document.getElementById('in-prize-font-size').value = config.prizeFontSize || 32;

            drawWheel();
            updateAnimations();
            window.addEventListener('resize', repositionBulbs);
        };
    </script>
</body>
</html>
